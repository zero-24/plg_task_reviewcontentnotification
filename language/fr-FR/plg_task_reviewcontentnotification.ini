PLG_TASK_REVIEWCONTENTNOTIFICATION_CATEGORIES_INCLUDE_DESC="Envoyer des notifications uniquement pour les catégories sélectionnées (inclure) ou envoyer des notifications en ignorant les catégories sélectionnées (exclure)"
PLG_TASK_REVIEWCONTENTNOTIFICATION_JCATEGORY_EXCLUDE="Non - Exclure"
