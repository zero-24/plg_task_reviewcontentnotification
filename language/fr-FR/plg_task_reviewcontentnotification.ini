PLG_TASK_REVIEWCONTENTNOTIFICATION_EMAIL_DESC="Liste d'adresses électroniques, séparées par des virgules, qui recevront tous les courriels de notification. Si laissé vide, et aucun auteur n'est défini pour l'article, tous les Super Utilisateurs de ce site recevront le courriel de notification."
PLG_TASK_REVIEWCONTENTNOTIFICATION_EMAIL_LBL="Adresses électroniques spécifiques"
PLG_TASK_REVIEWCONTENTNOTIFICATION_WHO_EMAIL_LABEL="Envoyer un courriel à"
