PLG_TASK_REVIEWCONTENTNOTIFICATION_SECOND_NOTIFICATION_LABEL="Envoyer une seconde notification"
PLG_TASK_REVIEWCONTENTNOTIFICATION_SECOND_NOTIFICATION_MAIL_BODY="Bonjour,\nVotre article n'a pas été mis à jour depuis {LAST_MODIFIED}.\nNous vous avons notifié il y a 2 mois et nous vous informons que votre article est désormais dépublié. Votre compte étant actif, vous pouvez en tout temps le reprendre et nous soumettre une demande de republication.\nCordialement, les administrateurs"
; You can use the following merge codes:
; {TITLE}			The title of the article the email is about now
; {PUBLIC_URL}		The public URL of the article
; {SITENAME}		Site name, as set in Global Configuration.
; {URL}				URL of the site's frontend page.
; {LAST_MODIFIED}	The date time value of the last modification of the article.
; {CREATED}			The date time value of the creation of the article
; {EDIT_URL}		The edit URL of the article
; {BACKEND_URL}		The URL to the backend
; {DATE_MODIFIER}	The date modfier value like "2" for two years
; \n				Newline character. Use it to start a new line in the email.
PLG_TASK_REVIEWCONTENTNOTIFICATION_SECOND_NOTIFICATION_MAIL_SUBJECT="Votre article sur {SITENAME} – {URL} n'a pas été mise à jour depuis {DATE_MODIFIER} ans"
PLG_TASK_REVIEWCONTENTNOTIFICATION_SEND_TITLE="Notification de revue de contenu"
PLG_TASK_REVIEWCONTENTNOTIFICATION_SEND_DESC="Cette tâche vérifie périodiquement le contenu qui n'a pas été modifié dans un délai défini. Vous pouvez personnaliser le courriel dans Système &rarr; Modèles d'e-mail."
PLG_TASK_REVIEWCONTENTNOTIFICATION_LANGUAGE_OVERRIDE_DESC="Sélectionnez une langue pour les courriels de notification. Réglez sur Auto pour les envoyer dans la langue du site."
PLG_TASK_REVIEWCONTENTNOTIFICATION_LANGUAGE_OVERRIDE_LBL="Langue du courriel"
PLG_TASK_REVIEWCONTENTNOTIFICATION_LANGUAGE_OVERRIDE_NONE="Auto"
PLG_TASK_REVIEWCONTENTNOTIFICATION_LANGUAGE_OVERRIDE_USER="Paramètres utilisateur"
PLG_TASK_REVIEWCONTENTNOTIFICATION_LIMIT_ITEMS_PER_RUN_LABEL="Combien d’éléments par tâche exécutée"
PLG_TASK_REVIEWCONTENTNOTIFICATION_LIMIT_ITEMS_PER_RUN_DESC="Entre 5 et 500"
PLG_TASK_REVIEWCONTENTNOTIFICATION_NOT_MODIFIED_MAIL_BODY="Bonjour,\nvotre article n'a pas été mis à jour depuis {DATE_MODIFIER} ans.\nAfin d'assurer une information pérenne, nous vous invitons à le revoir dans un délai de 2 mois. Ensuite, sans nouvelles de votre part, nous nous permettrons de le dépublier. Sachez cependant que votre compte reste actif et que vous pouvez en tout temps le reprendre et nous soumettre une demande de republication.\nCordialement, les administrateurs"
; You can use the following merge codes:
; {TITLE}			The title of the article the email is about now
; {PUBLIC_URL}		The public URL of the article
; {SITENAME}		Site name, as set in Global Configuration.
; {URL}				URL of the site's frontend page.
; {LAST_MODIFIED}	The date time value of the last modification of the article.
; {CREATED}			The date time value of the creation of the article
; {EDIT_URL}		The edit URL of the article
; {BACKEND_URL}		The URL to the backend
; {DATE_MODIFIER}	The date modfier value like "2" for two years
; \n				Newline character. Use it to start a new line in the email.
PLG_TASK_REVIEWCONTENTNOTIFICATION_NOT_MODIFIED_MAIL_SUBJECT="Votre article sur {SITENAME} – {URL} n'a pas été mise à jour depuis {DATE_MODIFIER} ans"
PLG_TASK_REVIEWCONTENTNOTIFICATION_MAIL_NOT_MODIFIED_MAIL_DESC="Notification par courriel à l'auteur de l'article lorsque le plugin tâche &quot;notification de revue de contenu&quot; détecte que la dernière date d'édition a dépassé le délai défini."
PLG_TASK_REVIEWCONTENTNOTIFICATION_MAIL_NOT_MODIFIED_MAIL_TITLE="Notification de revue de contenu"
PLG_TASK_REVIEWCONTENTNOTIFICATION_MAIL_SECOND_NOTIFICATION_MAIL_DESC="Envoyer à l'auteur de l'article si le plugin détecte que la date de la dernière publication est passée depuis trop longtemps et qu'aucune modification n'a été apportée depuis le premier message."
PLG_TASK_REVIEWCONTENTNOTIFICATION_MAIL_SECOND_NOTIFICATION_MAIL_TITLE="Seconde notification de revue de contenu"
PLG_TASK_REVIEWCONTENTNOTIFICATION_XML_DESCRIPTION="Ce plugin Joomla vérifie si un élément de contenu existant n'a pas été modifié pendant un certain temps pour en informer l'auteur et lui demander de revoir le contenu de l'article. Vous pouvez personnaliser le courriel dans Système &rarr; Modèles d'e-mail."
PLG_TASK_REVIEWCONTENTNOTIFICATION_AGGREGATION_TEMPLATE="{TITLE} - {BACKEND_URL}"
PLG_TASK_REVIEWCONTENTNOTIFICATION_MISSING_LIVE_SITE="Pour que le lien soit correct, cette tâche doit connaître l'URL de base de votre site web. Utilisez soit --live-site soit  $live_site dans votre configuration"

